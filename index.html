<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium QR Code Generator - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
    .glass {
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .neon-glow-teal {
      text-shadow: 0 0 10px rgba(20, 184, 166, 0.5), 0 0 20px rgba(20, 184, 166, 0.3);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden relative">
  <!-- Background glow -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-teal-500/10 blur-[120px] top-[-10%] left-[-10%] pointer-events-none"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[130px] bottom-[-20%] right-[-10%] pointer-events-none"></div>

  <div id="app" v-cloak class="w-full max-w-lg z-10">
    <!-- Header with Back link and Language Toggle -->
    <div class="mb-4 flex justify-between items-center px-2">
      <a href="/" class="text-xs font-semibold text-slate-400 hover:text-teal-400 flex items-center gap-1 transition">
        &larr; [[ t('back_to_portal') ]]
      </a>
      <div class="flex items-center gap-4">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">[[ t('tool_name') ]]</span>
        <button @click="toggleLanguage"
                class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-800/50 border border-slate-700/50 text-xs font-bold text-slate-300 hover:text-teal-400 hover:border-teal-500/50 transition shadow-sm"
                title="Toggle Language">
          [[ currentLang === 'en' ? 'EN' : 'JA' ]]
        </button>
      </div>
    </div>

    <div class="glass rounded-3xl p-6 sm:p-10 shadow-2xl flex flex-col relative overflow-hidden">
      <!-- Decor header -->
      <div class="w-full flex justify-between items-center mb-8 text-xs tracking-widest text-slate-500 font-semibold uppercase">
        <span>[[ t('generator') ]]</span>
        <span>[[ t('instant') ]]</span>
      </div>

      <!-- Input Field -->
      <div class="flex flex-col gap-2 mb-8">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">[[ t('input_label') ]]</label>
        <textarea v-model="inputText" @input="debouncedGenerate"
                  rows="3"
                  :placeholder="t('input_placeholder')"
                  class="bg-slate-900/80 border border-slate-800 rounded-2xl p-4 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-teal-500/50 resize-none transition text-sm sm:text-base"></textarea>
      </div>

      <!-- Generated QR Code Display -->
      <div class="flex flex-col items-center justify-center py-4 bg-slate-900/30 rounded-2xl border border-slate-900/50">
        <div class="relative p-4 bg-white rounded-2xl shadow-xl flex items-center justify-center min-w-[200px] min-h-[200px]"
             :class="{ 'opacity-30': !inputText }">
          <div id="qrcode-container"></div>
          <div v-if="!inputText" class="absolute inset-0 flex items-center justify-center text-slate-400 text-xs text-center p-4">
            [[ t('waiting_for_input') ]]
          </div>
        </div>

        <div v-if="inputText" class="mt-6 flex gap-4 w-full px-6 max-w-sm justify-center">
          <button @click="downloadQR"
                  class="flex-1 bg-gradient-to-r from-teal-500 to-emerald-400 text-slate-950 font-extrabold py-3 px-4 rounded-xl shadow-[0_0_15px_rgba(20,184,166,0.2)] hover:brightness-110 active:scale-95 transition text-sm flex justify-center items-center gap-1">
            [[ t('download') ]]
          </button>
          <button @click="clear"
                  class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 py-3 px-4 rounded-xl active:scale-95 transition text-sm">
            [[ t('clear') ]]
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const { createApp, ref, onMounted, nextTick } = Vue;

      createApp({
        compilerOptions: { delimiters: ['[[', ']]'] },
        setup() {
          const inputText = ref('https://free-web-tools.example.com');
          const translations = ref({});
          const currentLang = ref('en');

          let qrcodeInstance = null;
          let debounceTimer = null;

          const t = (key) => {
            if (!translations.value[currentLang.value]) return key;
            return translations.value[currentLang.value][key] || key;
          };

          const toggleLanguage = () => {
            currentLang.value = currentLang.value === 'en' ? 'ja' : 'en';
            localStorage.setItem('preferred-lang', currentLang.value);
            document.documentElement.lang = currentLang.value;
          };

          const initI18n = async () => {
            try {
              const res = await fetch('./i18n.json');
              const data = await res.json();
              translations.value = data;

              const savedLang = localStorage.getItem('preferred-lang');
              if (savedLang && (savedLang === 'en' || savedLang === 'ja')) {
                currentLang.value = savedLang;
              } else {
                const navLang = navigator.language || navigator.userLanguage;
                currentLang.value = navLang.startsWith('ja') ? 'ja' : 'en';
              }
              document.documentElement.lang = currentLang.value;
            } catch (err) {
              console.error('Failed to load translations', err);
            }
          };

          const generateQR = () => {
            const container = document.getElementById('qrcode-container');
            if (!container) return;

            // Clear previous QR
            container.innerHTML = '';

            if (!inputText.value.trim()) {
              return;
            }

            // Generate new QR Code
            try {
              qrcodeInstance = new QRCode(container, {
                text: inputText.value,
                width: 180,
                height: 180,
                colorDark: '#0f172a', // slate-900 for high quality scanning
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
              });
            } catch (err) {
              console.error('QR code generation failed:', err);
            }
          };

          const debouncedGenerate = () => {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateQR, 200);
          };

          const clear = () => {
            inputText.value = '';
            const container = document.getElementById('qrcode-container');
            if (container) container.innerHTML = '';
          };

          const downloadQR = () => {
            const container = document.getElementById('qrcode-container');
            if (!container) return;

            const img = container.querySelector('img');
            if (!img || !img.src) {
              // Try canvas fallback
              const canvas = container.querySelector('canvas');
              if (canvas) {
                const url = canvas.toDataURL('image/png');
                triggerDownload(url);
              }
              return;
            }
            triggerDownload(img.src);
          };

          const triggerDownload = (dataUrl) => {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'qrcode.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };

          onMounted(async () => {
            await initI18n();
            nextTick(() => {
              generateQR();
            });
          });

          return {
            inputText,
            debouncedGenerate,
            clear,
            downloadQR,
            t,
            currentLang,
            toggleLanguage
          };
        }
      }).mount('#app');
    })();
  </script>
</body>
</html>
