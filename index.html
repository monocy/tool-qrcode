<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium QR Code Generator - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  
  <script type="module">
  import SettingsModal from '../../static/js/settings_modal.js';
  import BackgroundModal from '../../static/js/background_modal.js';
  import { usePortalCommon } from '../../static/js/portal_common.js';

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neonBlue: '#00f0ff',
            neonGreen: '#39ff14',
            neonPurple: '#d300ff',
            neonRed: '#ff073a',
            slateDark: '#0b0f19'
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="../../static/css/portal.css">
  <style>

    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }

  </style>
</head>
<body class="min-h-screen relative overflow-hidden flex flex-col justify-between" id="theme-root">

  <div id="app" v-cloak class="min-h-screen w-full flex flex-col justify-between relative z-10">
    
    <!-- Dynamic Background Image Layer -->
    <div class="absolute inset-0 pointer-events-none transition-all duration-500 z-0 bg-cover bg-center"
         :style="{ 
           backgroundImage: settings.bgUrl ? 'url(' + settings.bgUrl + ')' : 'none',
           opacity: settings.bgOpacity,
           filter: 'blur(' + settings.bgBlur + 'px)'
         }">
    </div>

    <!-- Header Navigation -->
    <header class="relative z-10 w-full px-6 py-4 flex justify-between items-center glass-panel border-b">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center text-[var(--text-main)] text-xl font-bold shadow-md shadow-cyan-500/20">
          <i class="fa-solid fa-qrcode"></i>
        </div>
        <div>
          <h1 class="text-lg font-black tracking-wider uppercase bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
            [[ t('tool_title') ]]
          </h1>
          <span class="text-[9px] font-bold text-[var(--text-muted)] font-mono tracking-widest">// STANDALONE TOOL</span>
        </div>
      </div>
      
      <!-- Top Action Controls -->
      <div class="flex items-center gap-3">
        <!-- Fullscreen Switcher -->
        <button @click="toggleFullscreen" 
                class="w-10 h-10 rounded-xl flex items-center justify-center border border-[var(--border-color)] bg-[var(--bg-card)] text-[var(--text-muted)] hover:text-[var(--text-main)] hover:border-cyan-500/40 transition duration-300"
                :title="isFullscreen ? t('fullscreen_exit') : t('fullscreen_enter')">
          <i :class="isFullscreen ? 'fa-solid fa-compress' : 'fa-solid fa-expand'"></i>
        </button>
        
        <!-- Settings Gear Toggle Button -->
        <button @click="isSettingsOpen = true" 
                class="w-10 h-10 rounded-xl flex items-center justify-center border border-[var(--border-color)] bg-[var(--bg-card)] text-[var(--text-muted)] hover:text-[var(--text-main)] hover:border-cyan-500/40 transition duration-300">
          <i class="fa-solid fa-gear animate-spin-slow"></i>
        </button>
      </div>
    </header>

    <!-- Main Workspace Container -->
    <main class="relative z-10 w-full max-w-4xl mx-auto flex-grow flex flex-col items-center justify-center px-6 py-12">
      <!-- QR Code Body -->
      <div class="w-full glass-panel p-6 sm:p-10 rounded-3xl neon-shadow flex flex-col relative overflow-hidden max-w-lg">
        <!-- Decor Header -->
        <div class="w-full flex justify-between items-center mb-8 text-[10px] tracking-widest text-[var(--text-muted)] font-semibold uppercase">
          <span>[[ t('generator') ]]</span>
          <span>[[ t('instant') ]]</span>
        </div>

        <!-- Input Field -->
        <div class="flex flex-col gap-2 mb-8 w-full">
          <label class="text-xs font-bold text-[var(--text-muted)] uppercase tracking-wider">[[ t('input_label') ]]</label>
          <textarea v-model="inputText" @input="debouncedGenerate"
                    rows="3"
                    :placeholder="t('input_placeholder')"
                    class="bg-[var(--bg-card)] border border-[var(--border-color)] rounded-2xl p-4 text-[var(--text-main)] placeholder-slate-600 focus:outline-none focus:border-[var(--accent-color)] resize-none transition text-sm sm:text-base"></textarea>
        </div>

        <!-- Generated QR Code Display -->
        <div class="flex flex-col items-center justify-center py-4 bg-[var(--bg-card)]/30 rounded-2xl border border-slate-900/50 w-full">
          <div class="relative p-4 bg-[var(--bg-card)] rounded-2xl shadow-xl flex items-center justify-center min-w-[200px] min-h-[200px]"
               :class="{ 'opacity-30': !inputText }">
            <div id="qrcode-container"></div>
            <div v-if="!inputText" class="absolute inset-0 flex items-center justify-center text-[var(--text-muted)] text-xs text-center p-4">
              [[ t('waiting_for_input') ]]
            </div>
          </div>

          <div v-if="inputText" class="mt-6 flex gap-4 w-full px-6 max-w-sm justify-center">
            <button @click="downloadQR"
                    class="flex-1 text-[var(--text-main)] font-extrabold py-3 px-4 rounded-xl hover:brightness-110 active:scale-95 transition text-sm flex justify-center items-center gap-1"
                    :style="{ background: 'linear-gradient(135deg, var(--accent-color), #8b5cf6)', color: settings.theme === 'light' ? '#ffffff' : '#0b0f19', boxShadow: 'var(--accent-glow-intensity)' }">
              [[ t('download') ]]
            </button>
            <button @click="clear"
                    class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 py-3 px-4 rounded-xl active:scale-95 transition text-sm">
              [[ t('clear') ]]
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer Controls -->
    <footer class="relative z-10 w-full px-6 py-4 flex justify-between items-center glass-panel border-t text-xs" style="color: var(--text-muted);">
      <div>&copy; 2026 Free Web Tools Project.</div>
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="font-mono uppercase text-[10px]">Active Node</span>
      </div>
    </footer>

    <!-- Settings Modal Component -->
    <!-- Settings Modal Component -->
    <settings-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isSettingsOpen" 
      @close="isSettingsOpen = false"
      @reset="resetToDefault"
      @open-bg-modal="isBgModalOpen = true"
    ></settings-modal>

    <!-- Background Modal Component -->
    <background-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isBgModalOpen" 
      @close="isBgModalOpen = false"
    ></background-modal>
<script type="module">
  import SettingsModal from '../../static/js/settings_modal.js';
  import BackgroundModal from '../../static/js/background_modal.js';
  import { usePortalCommon } from '../../static/js/portal_common.js';

    (() => {
      const { createApp, ref, reactive, computed, onMounted, onUnmounted, watch, nextTick } = Vue;

      const DEFAULT_SETTINGS = {
        lang: 'en',
        theme: 'dark',
        bgUrl: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop',
        bgOpacity: 0.15,
        bgBlur: 8,
        custom: {}
      };

      createApp({
        components: { SettingsModal, BackgroundModal },
        compilerOptions: { delimiters: ['[[', ']]'] },
        setup() {
          const translations = ref({});
          const portal = usePortalCommon(translations, (typeof DEFAULT_SETTINGS !== 'undefined' && DEFAULT_SETTINGS.custom) || {});
          const { settings, showSettings: isSettingsOpen, isBgModalOpen, isFullscreen, t, toggleFullscreen } = portal;

          // QR specific variables
          const inputText = ref('https://free-web-tools.example.com');
          let qrcodeInstance = null;
          let debounceTimer = null;

          const loadTranslations = async () => {
            try {
              const res = await fetch('./i18n.json');
              translations.value = await res.json();
              updateDocumentMetadata();
            } catch (e) {
              console.error("Failed to load local translations", e);
            }
          };

          const updateDocumentMetadata = () => {
            document.title = t('page_title');
            document.documentElement.lang = settings.lang;
          };

          const closeSettings = () => {
            isSettingsOpen.value = false;
          };

          const resetToDefault = () => {
            portal.resetSettings();
            updateDocumentMetadata();
          };

          const setTheme = (themeName) => {
            settings.theme = themeName;
          };

          const setLang = (langCode) => {
            settings.lang = langCode;
          };
// QR Code specific functions
          const generateQR = () => {
            const container = document.getElementById('qrcode-container');
            if (!container) return;

            container.innerHTML = '';

            if (!inputText.value.trim()) {
              return;
            }

            try {
              qrcodeInstance = new QRCode(container, {
                text: inputText.value,
                width: 180,
                height: 180,
                colorDark: '#0f172a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
              });
            } catch (err) {
              console.error('QR code generation failed:', err);
            }
          };

          const debouncedGenerate = () => {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateQR, 200);
          };

          const clear = () => {
            inputText.value = '';
            const container = document.getElementById('qrcode-container');
            if (container) container.innerHTML = '';
          };

          const downloadQR = () => {
            const container = document.getElementById('qrcode-container');
            if (!container) return;

            const img = container.querySelector('img');
            if (!img || !img.src) {
              const canvas = container.querySelector('canvas');
              if (canvas) {
                const url = canvas.toDataURL('image/png');
                triggerDownload(url);
              }
              return;
            }
            triggerDownload(img.src);
          };

          const triggerDownload = (dataUrl) => {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'qrcode.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };

          watch(() => settings.lang, () => {
            updateDocumentMetadata();
          });

          onMounted(() => {
            loadTranslations();
            
            nextTick(() => {
              generateQR();
            });
          });

          return {
            isSettingsOpen,
            isBgModalOpen,
            isFullscreen,
            settings,
            t,
            setTheme,
            setLang,
            closeSettings,
            resetToDefault,
            toggleFullscreen,
            inputText,
            debouncedGenerate,
            clear,
            downloadQR
          };
        }
      }).mount('#app');
    })();
  </script>
</body>
</html>
