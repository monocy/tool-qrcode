<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium QR Code Generator - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  
  <script>
    (() => {
      const isLocalFile = window.location.protocol === 'file:';
      const baseDir = isLocalFile ? '../../../../../' : '../../';

      // Load CSS
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = baseDir + 'static/css/portal.css';
      document.head.appendChild(link);

      // Load Scripts
      const commonScripts = [
        'static/js/portal_common.js',
        'static/js/settings_modal.js',
        'static/js/background_modal.js',
        'static/js/portal_components.js'
      ];

      function loadScripts(index) {
        if (index >= commonScripts.length) {
          window.dispatchEvent(new Event('common-assets-loaded'));
          return;
        }
        const script = document.createElement('script');
        script.src = baseDir + commonScripts[index];
        script.onload = () => loadScripts(index + 1);
        script.onerror = () => console.error('Failed to load: ' + script.src);
        document.head.appendChild(script);
      }
      loadScripts(0);
    })();
  </script>
  <script>

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neonBlue: '#00f0ff',
            neonGreen: '#39ff14',
            neonPurple: '#d300ff',
            neonRed: '#ff073a',
            slateDark: '#0b0f19'
          }
        }
      }
    }
  </script>
  
  
  <style>

    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }

  </style>
</head>
<body class="bg-[var(--bg-primary)] text-[var(--text-main)] min-h-screen relative overflow-hidden flex flex-col justify-between transition-colors duration-300" id="theme-root">

  <div id="app" v-cloak class="min-h-screen w-full flex flex-col justify-between relative z-10">
    
    <!-- Dynamic Background Image Layer -->
    <div class="absolute inset-0 pointer-events-none transition-all duration-500 z-0 bg-cover bg-center"
         :style="{ 
           backgroundImage: settings.bgUrl ? 'url(' + settings.bgUrl + ')' : 'none',
           opacity: settings.bgOpacity,
           filter: 'blur(' + settings.bgBlur + 'px)'
         }">
    </div>

    <!-- Header Navigation -->
    <portal-header 
      :settings="settings" 
      :translations="translations" 
      :is-fullscreen="isFullscreen" 
      @toggle-fullscreen="toggleFullscreen" 
      @toggle-theme="toggleTheme" 
      @open-settings="isSettingsOpen = true"
    ></portal-header>

    <!-- Main Workspace Container -->
    <main class="relative z-10 w-full max-w-4xl mx-auto flex-grow flex flex-col items-center justify-center px-6 py-12">
      <!-- QR Code Body -->
      <div class="w-full glass-panel p-6 sm:p-10 rounded-3xl neon-shadow flex flex-col relative overflow-hidden max-w-lg">
        

        <!-- Input Field -->
        <div class="flex flex-col gap-2 mb-8 w-full">
          <label class="text-xs font-bold text-[var(--text-muted)] uppercase tracking-wider">[[ t('input_label') ]]</label>
          <textarea v-model="inputText" @input="debouncedGenerate"
                    rows="3"
                    :placeholder="t('input_placeholder')"
                    class="bg-[var(--bg-card)] border border-[var(--border-color)] rounded-2xl p-4 text-[var(--text-main)] placeholder-slate-600 focus:outline-none focus:border-[var(--accent-color)] resize-none transition text-sm sm:text-base"></textarea>
        </div>

        <!-- Generated QR Code Display -->
        <div class="flex flex-col items-center justify-center py-4 bg-[var(--bg-card)]/30 rounded-2xl border border-slate-900/50 w-full">
          <div class="relative p-4 bg-[var(--bg-card)] rounded-2xl shadow-xl flex items-center justify-center min-w-[200px] min-h-[200px]"
               :class="{ 'opacity-30': !inputText }">
            <div id="qrcode-container"></div>
            <div v-if="!inputText" class="absolute inset-0 flex items-center justify-center text-[var(--text-muted)] text-xs text-center p-4">
              [[ t('waiting_for_input') ]]
            </div>
          </div>

          <div v-if="inputText" class="mt-6 flex gap-4 w-full px-6 max-w-sm justify-center">
            <button @click="downloadQR"
                    class="flex-1 text-[var(--text-main)] font-extrabold py-3 px-4 rounded-xl hover:brightness-110 active:scale-95 transition text-sm flex justify-center items-center gap-1"
                    :style="{ background: 'linear-gradient(135deg, var(--accent-color), #8b5cf6)', color: settings.theme === 'light' ? '#ffffff' : '#0b0f19', boxShadow: 'var(--accent-glow-intensity)' }">
              [[ t('download') ]]
            </button>
            <button @click="clear"
                    class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 py-3 px-4 rounded-xl active:scale-95 transition text-sm">
              [[ t('clear') ]]
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer Controls -->
    <portal-footer></portal-footer>

    <!-- Floating Fullscreen Button -->
    <portal-controls
      :settings="settings"
      :translations="translations"
      @toggle-fullscreen="toggleFullscreen"
    ></portal-controls>

    <!-- Settings Modal Component -->
    <!-- Settings Modal Component -->
    <settings-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isSettingsOpen" 
      @close="isSettingsOpen = false"
      @reset="resetToDefault"
      @open-bg-modal="isBgModalOpen = true"
    ></settings-modal>

    <!-- Background Modal Component -->
    <background-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isBgModalOpen" 
      @close="isBgModalOpen = false"
    ></background-modal>
<script>

    window.addEventListener('common-assets-loaded', () => {
      (() => {
        const { createApp, ref, reactive, computed, onMounted, onUnmounted, watch, nextTick } = Vue;

      const DEFAULT_SETTINGS = {
        lang: 'en',
        theme: 'dark',
        bgUrl: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop',
        bgOpacity: 0.15,
        bgBlur: 8,
        custom: {}
      };

      createApp({
        components: { SettingsModal, BackgroundModal,
          PortalHeader,
          PortalFooter,
          PortalControls
        },
        compilerOptions: { delimiters: ['[[', ']]'] },
        setup() {
          const portal = usePortalCommon((typeof DEFAULT_SETTINGS !== 'undefined' && DEFAULT_SETTINGS.custom) || {});
          const { settings, showSettings: isSettingsOpen, isBgModalOpen, isFullscreen, translations, t, toggleFullscreen, toggleTheme } = portal;

          // QR specific variables
          const inputText = ref('https://free-web-tools.example.com');
          let qrcodeInstance = null;
          let debounceTimer = null;

          const originalTitle = document.title;
          const updateDocumentMetadata = () => {
            const pageTitle = t('page_title');
            document.title = (pageTitle === 'page_title' || !pageTitle) ? originalTitle : pageTitle;
            document.documentElement.lang = settings.lang;
          };

          const closeSettings = () => {
            isSettingsOpen.value = false;
          };

          const resetToDefault = () => {
            portal.resetSettings();
            updateDocumentMetadata();
          };

          const setTheme = (themeName) => {
            settings.theme = themeName;
          };

          const setLang = (langCode) => {
            settings.lang = langCode;
          };
// QR Code specific functions
          const generateQR = () => {
            const container = document.getElementById('qrcode-container');
            if (!container) return;

            container.innerHTML = '';

            if (!inputText.value.trim()) {
              return;
            }

            try {
              qrcodeInstance = new QRCode(container, {
                text: inputText.value,
                width: 180,
                height: 180,
                colorDark: '#0f172a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
              });
            } catch (err) {
              console.error('QR code generation failed:', err);
            }
          };

          const debouncedGenerate = () => {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateQR, 200);
          };

          const clear = () => {
            inputText.value = '';
            const container = document.getElementById('qrcode-container');
            if (container) container.innerHTML = '';
          };

          const downloadQR = () => {
            const container = document.getElementById('qrcode-container');
            if (!container) return;

            const img = container.querySelector('img');
            if (!img || !img.src) {
              const canvas = container.querySelector('canvas');
              if (canvas) {
                const url = canvas.toDataURL('image/png');
                triggerDownload(url);
              }
              return;
            }
            triggerDownload(img.src);
          };

          const triggerDownload = (dataUrl) => {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'qrcode.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };

          // Watch translations and lang changes to reactively update document details
          watch([translations, () => settings.lang], () => {
            updateDocumentMetadata();
          }, { deep: true, immediate: true });

          onMounted(() => {
            nextTick(() => {
              generateQR();
            });
          });

          return {
            isSettingsOpen,
            isBgModalOpen,
            isFullscreen,
            settings,
            translations,
            t,
            setTheme,
            setLang,
            closeSettings,
            resetToDefault,
            toggleFullscreen,
            inputText,
            debouncedGenerate,
            clear,
            downloadQR,
            toggleTheme
          };
        }
      }).mount('#app');
      })();
    });
  </script>
</body>
</html>
